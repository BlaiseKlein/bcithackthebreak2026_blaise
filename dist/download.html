<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body { 
            background-color: #05070a;

            overflow: hidden;

        /* mask to fade the animation out at the top/bottom */
        #matrixCanvas {
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">
<body class="flex items-center justify-center min-h-screen text-white">
    <nav class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 py-4 glass-box !rounded-none border-t-0 border-x-0">
        <div class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
            APPNAMEWOW
        </div>
        <a href="https://github.com/BlaiseKlein/bcithackthebreak2026_blaise" target="_blank" class="transition-opacity hover:opacity-70" aria-label="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
                <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                <path d="M9 18c-4.51 2-5-2-7-2"></path>
            </svg>
        </a>
    </nav>

    <canvas id="matrixCanvas" class="absolute top-0 left-0 w-full h-full -z-20 pointer-events-none opacity-30"></canvas>

    <div class="absolute w-[600px] h-[600px] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    
    <div class="relative z-10 w-full max-w-3xl p-12 mx-4 text-center border border-white/10 rounded-3xl bg-white/5 backdrop-blur-xl shadow-2xl">
    
        <h1 class="mb-4 text-6xl md:text-7xl tracking-tighter leading-[1.2] pb-4 text-transparent bg-clip-text drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]"
            style="background-image: radial-gradient(circle, #ffffff 30%, #8c8c8c 150%); filter: drop-shadow(0 0 40px rgba(54, 235, 226, 0.4));">
            The interactive networking CLI
        </h1>
    
        <p class="mb-10 text-lg text-gray-400">
            Streamline networking development for Linux.
        </p>
        
        <div class="flex flex-col items-center justify-center gap-4 sm:flex-row">
            <button class="flex items-center gap-3 px-8 py-3 font-semibold text-white transition-transform bg-[#289cad] rounded-xl hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                <img src="https://cdn.simpleicons.org/linux/white" class="w-6 h-6" alt="Linux Logo">
                <span>Download for Linux</span>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        // set canvas size to full screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const characters = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = Array.from({ length: Math.ceil(columns) }).map(() => Math.random() * -100);

        function drawMatrix() {
            // half-transparent background creates the trailing effect
            ctx.fillStyle = "rgba(5, 7, 10, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // sets character color
            ctx.fillStyle = "#0F0"; 
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                
                // make some characters white for glisten
                if (Math.random() > 0.98) ctx.fillStyle = "#FFF";
                else ctx.fillStyle = "#0F0";

                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // reset drops to the top when it reaches the bottom
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 40);
    </script>
</body>
